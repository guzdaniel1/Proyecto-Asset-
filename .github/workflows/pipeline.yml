name: Device Tracking Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run analysis
      run: |
        python src/main.py

    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: results
        path: output/results.csv
      
